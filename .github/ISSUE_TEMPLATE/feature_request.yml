name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: "What problem does this feature solve, or what use case does it enable?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "Describe what you'd like to see. Include API sketches or examples if helpful."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any workarounds you've tried or other approaches you evaluated."

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Links, references, screenshots, or anything else relevant."
